name: Bug Report
description: Report a bug to help us improve the integration.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: router_model
    attributes:
      label: Router model
      placeholder: e.g. GL-MT6000 (Flint 2)
    validations:
      required: true
  - type: input
    id: firmware_version
    attributes:
      label: Firmware version
      placeholder: e.g. 4.6.2
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: e.g. 1.1.1
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2024.5.1
    validations:
      required: true
  - type: dropdown
    id: install_type
    attributes:
      label: Home Assistant install type
      options:
        - Home Assistant OS (HAOS)
        - Home Assistant Container (Docker)
        - Home Assistant Supervised
        - Home Assistant Core (Manual)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Any errors in logs
      description: Please paste any relevant error logs from Home Assistant.
      placeholder: |
        2024-05-08 20:00:00 ERROR (MainThread) [custom_components.ha_glinet.hub] ...
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug and how to reproduce it.
    validations:
      required: true
