# All Dependabot PRs are opened against the `development` branch,
# which is the integration branch. Releases are cut from `development`
# into `main`; Dependabot should never target `main` directly.
# See CONTRIBUTING.md and .github/BRANCH_PROTECTION.md for context.

version: 2
updates:
  # Check for Python dependency updates
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    target-branch: "development"

  # Check for GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    target-branch: "development"
