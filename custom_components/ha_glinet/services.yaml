send_sms:
  name: Send SMS
  description: Send a text message through a GL-INet router with SMS support.
  fields:
    recipient:
      selector:
        text:
      required: true
      example: "1234567890"
    text:
      selector:
        text:
          multiline: true
      required: true
      example: "Router test message"

refresh_clients:
  name: Refresh clients
  description: Refresh tracked clients and clear the router client cache when supported.
  fields:
    mac:
      selector:
        text:
      required: false

get_sms:
  name: Get SMS messages
  description: Retrieve all SMS messages from the router. Returns message list in action response.
  fields:
    mac:
      selector:
        text:
      required: false

remove_sms:
  name: Remove SMS
  description: Deletes SMS messages from the router.
  fields:
    scope:
      name: Scope
      description: "The range of SMS to remove (10: Single message, 11: All, 0: All unread, 1: All read, 2: All sent, 12: All received)."
      selector:
        number:
          min: 0
          max: 13
          mode: box
      required: true
      default: 10
    message_id:
      name: Message ID
      description: The unique identifier for the SMS (required for scope 10).
      selector:
        text:

scan_wifi:
  name: Scan WiFi networks
  description: Scan for available WiFi networks to connect in repeater mode. Returns network list in action response.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional if only one router configured).
      selector:
        text:
      required: false
    all_band:
      name: All bands
      description: Scan all frequency bands instead of only the locked band.
      selector:
        boolean:
      required: false
      default: false
    dfs:
      name: Include DFS
      description: Include DFS channels in scan results.
      selector:
        boolean:
      required: false
      default: false

connect_wifi:
  name: Connect to WiFi
  description: Connect to an external WiFi network in repeater mode.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional if only one router configured).
      selector:
        text:
      required: false
    ssid:
      name: SSID
      description: The network name to connect to.
      selector:
        text:
      required: true
      example: "CampgroundWiFi"
    password:
      name: Password
      description: The network password (leave empty for open networks).
      selector:
        text:
          type: password
      required: false
    remember:
      name: Remember network
      description: Save network credentials for auto-reconnect.
      selector:
        boolean:
      required: false
      default: true
    bssid:
      name: BSSID
      description: Lock connection to specific access point MAC address.
      selector:
        text:
      required: false

disconnect_wifi:
  name: Disconnect WiFi
  description: Disconnect from the current external WiFi network.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional if only one router configured).
      selector:
        text:
      required: false

get_saved_networks:
  name: Get saved networks
  description: Get list of saved WiFi networks for repeater mode. Returns network list in action response.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional if only one router configured).
      selector:
        text:
      required: false

remove_saved_network:
  name: Remove saved network
  description: Remove a saved WiFi network from the router.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional if only one router configured).
      selector:
        text:
      required: false
    ssid:
      name: SSID
      description: The network name to remove.
      selector:
        text:
      required: true

set_fan_temperature:
  name: Set fan threshold temperature
  description: Set the temperature threshold at which the fan should start running.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional).
      selector:
        text:
      required: false
    temperature:
      name: Threshold temperature
      description: Trigger temperature in Celsius (70-90).
      selector:
        number:
          min: 70
          max: 90
          unit_of_measurement: "°C"
          mode: slider
      required: true
      example: 75

add_firewall_rule:
  name: Add firewall rule
  description: Add a custom firewall rule to the router.
  fields:
    mac:
      selector:
        text:
    name:
      selector:
        text:
    src:
      selector:
        text:
    src_ip:
      selector:
        text:
    src_mac:
      selector:
        text:
    src_port:
      selector:
        text:
    proto:
      selector:
        text:
    dest:
      selector:
        text:
    dest_ip:
      selector:
        text:
    dest_port:
      selector:
        text:
    target:
      selector:
        text:
    enabled:
      selector:
        boolean:

remove_firewall_rule:
  name: Remove firewall rule
  description: Remove an existing firewall rule.
  fields:
    mac:
      selector:
        text:
    rule_id:
      selector:
        text:
    remove_all:
      selector:
        boolean:

add_port_forward:
  name: Add port forward
  description: Add a port forwarding rule.
  fields:
    mac:
      selector:
        text:
    name:
      selector:
        text:
    src:
      selector:
        text:
    src_dport:
      selector:
        text:
    proto:
      selector:
        text:
    dest:
      selector:
        text:
    dest_ip:
      selector:
        text:
    dest_port:
      selector:
        text:
    enabled:
      selector:
        boolean:

remove_port_forward:
  name: Remove port forward
  description: Remove an existing port forwarding rule.
  fields:
    mac:
      selector:
        text:
    rule_id:
      selector:
        text:
    remove_all:
      selector:
        boolean:

set_dmz:
  name: Set DMZ
  description: Configure DMZ (Demilitarized Zone) settings.
  fields:
    mac:
      selector:
        text:
    enabled:
      selector:
        boolean:
    dest_ip:
      selector:
        text:

parental_control_set_temporary_override:
  name: Set parental control temporary override
  description: Enable or disable a temporary brief rule for a parental control group.
  fields:
    mac:
      selector:
        text:
    group_id:
      selector:
        text:
      required: true
    enabled:
      selector:
        boolean:
      required: true
    rule_id:
      selector:
        text:
      required: true
      example: "drop"
    duration:
      selector:
        text:
      required: false
      example: "01:00:00"

parental_control_set_filtering_mode:
  name: Set parental control filtering mode
  description: Set the router parental control filtering mode.
  fields:
    mac:
      selector:
        text:
    mode:
      selector:
        number:
          min: 0
          max: 10
          mode: box
      required: true

parental_control_update_signatures:
  name: Update parental control signatures
  description: Ask the router to update its parental control signature database.
  fields:
    mac:
      selector:
        text:

access_control_set_mode:
  name: Set access control mode
  description: Switch device access control between blacklist and whitelist modes.
  fields:
    mac:
      selector:
        text:
    mode:
      selector:
        select:
          options:
            - black
            - white
      required: true

access_control_set_device_block:
  name: Set device block
  description: Block or unblock internet access for a client MAC address.
  fields:
    mac:
      selector:
        text:
    src_mac:
      name: Client MAC
      selector:
        text:
      required: true
    block:
      selector:
        boolean:
      required: true

parental_control_set_group_schedules:
  name: Set parental control group schedules
  description: Enable or bypass schedules for a parental control group.
  fields:
    mac:
      selector:
        text:
    group_id:
      selector:
        text:
      required: true
    enabled:
      selector:
        boolean:
      required: true
