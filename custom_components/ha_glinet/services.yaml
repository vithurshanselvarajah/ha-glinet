send_sms:
  name: Send SMS
  description: Send a text message through a GL-INet router with SMS support.
  fields:
    recipient:
      selector:
        text:
      required: true
      example: "1234567890"
    text:
      selector:
        text:
          multiline: true
      required: true
      example: "Router test message"

refresh_clients:
  name: Refresh clients
  description: Refresh tracked clients and clear the router client cache when supported.
  fields:
    mac:
      selector:
        text:
      required: false

get_sms:
  name: Get SMS messages
  description: Retrieve all SMS messages from the router. Returns message list in action response.
  fields:
    mac:
      selector:
        text:
      required: false

remove_sms:
  name: Remove SMS
  description: Deletes SMS messages from the router.
  fields:
    scope:
      name: Scope
      description: "The range of SMS to remove (10: Single message, 11: All, 0: All unread, 1: All read, 2: All sent, 12: All received)."
      selector:
        number:
          min: 0
          max: 13
          mode: box
      required: true
      default: 10
    message_id:
      name: Message ID
      description: The unique identifier for the SMS (required for scope 10).
      selector:
        text:

scan_wifi:
  name: Scan WiFi networks
  description: Scan for available WiFi networks to connect in repeater mode. Returns network list in action response.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional if only one router configured).
      selector:
        text:
      required: false
    all_band:
      name: All bands
      description: Scan all frequency bands instead of only the locked band.
      selector:
        boolean:
      required: false
      default: false
    dfs:
      name: Include DFS
      description: Include DFS channels in scan results.
      selector:
        boolean:
      required: false
      default: false

connect_wifi:
  name: Connect to WiFi
  description: Connect to an external WiFi network in repeater mode.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional if only one router configured).
      selector:
        text:
      required: false
    ssid:
      name: SSID
      description: The network name to connect to.
      selector:
        text:
      required: true
      example: "CampgroundWiFi"
    password:
      name: Password
      description: The network password (leave empty for open networks).
      selector:
        text:
          type: password
      required: false
    remember:
      name: Remember network
      description: Save network credentials for auto-reconnect.
      selector:
        boolean:
      required: false
      default: true
    bssid:
      name: BSSID
      description: Lock connection to specific access point MAC address.
      selector:
        text:
      required: false

disconnect_wifi:
  name: Disconnect WiFi
  description: Disconnect from the current external WiFi network.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional if only one router configured).
      selector:
        text:
      required: false

get_saved_networks:
  name: Get saved networks
  description: Get list of saved WiFi networks for repeater mode. Returns network list in action response.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional if only one router configured).
      selector:
        text:
      required: false

remove_saved_network:
  name: Remove saved network
  description: Remove a saved WiFi network from the router.
  fields:
    mac:
      name: Router MAC
      description: Target router MAC address (optional if only one router configured).
      selector:
        text:
      required: false
    ssid:
      name: SSID
      description: The network name to remove.
      selector:
        text:
      required: true
